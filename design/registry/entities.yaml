  - name: key_door_balance
    status: active
    source: design/gdd/floor-layout-data.md
    referenced_by:
      - design/gdd/floor-layout-data.md
    description: "F-K1 — 单层钥匙-门颜色平衡约束：每层每种颜色的可拾取钥匙数必须 >= 该层该颜色的门数。防止单层死锁。"
    expression: "KEY_COUNT(f, c) >= DOOR_COUNT(f, c)  [for each floor f, each color c in {YELLOW, BLUE}]"
    variables:
      - KEY_COUNT_f_c
      - DOOR_COUNT_f_c
    output_range: [true, false]
    notes: "单层封闭策略（不跨层累积）。玩家可持有跨层钥匙，但数据层不建模运行时状态。启动时 ERROR。"
    added: "2026-06-24"
    revised: ""

  - name: floor_exit_existence
    status: active
    source: design/gdd/floor-layout-data.md
    referenced_by:
      - design/gdd/floor-layout-data.md
    description: "F-R1 — 出口存在性（弱连通性断言）：非顶层楼层至少有 1 个 STAIR_UP 格。顶层豁免。"
    expression: "STAIR_UP_COUNT(f) >= 1  [for all f where floor_number < max_floor_number]"
    variables:
      - STAIR_UP_COUNT_f
      - max_floor_number
    output_range: [true, false]
    notes: "弱连通性断言（非完整 BFS）。随机楼层引入（Alpha+ #20）时须升级为完整 BFS 校验。启动时 ERROR。"
    added: "2026-06-24"
    revised: ""

  - name: t_cell
    status: active
    source: design/gdd/grid-movement.md
    referenced_by:
      - design/gdd/grid-movement.md
    description: "TK-1 / F-MOV — 玩家标记单格移动动画时长（上限）。F-MOV 约束：T_total = path_length × T_cell ≤ 1500ms。"
    expression: "T_total = path_length × T_cell"
    variables:
      - T_cell
      - path_length
      - T_total
    output_range: [0, 1500]
    notes: "默认 50ms；安全范围 20–67ms（GDD TK-1 第 2 轮收窄；联合约束 T_cell × MAX_PATH_LENGTH ≤ 1500ms）。若其他系统（如 CombatForecast #10 动画、楼层过渡）需引用移动节奏，应参考此注册值。"
    added: "2026-06-26"
    revised: ""
