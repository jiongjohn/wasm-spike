# ─── FORMULAS ────────────────────────────────────────────────────────────────

formulas:
  - name: def_constraint
    status: active
    source: design/gdd/entity-database.md
    referenced_by:
      - design/gdd/entity-database.md
    description: "D1 — DEF 上限约束：怪物防御力的设计合法性检验。保证玩家在 N_max 回合内可击杀该怪物。"
    expression: "max(1, player_ATK_expected - monster_DEF) >= ceil(monster_HP / N_max)"
    variables:
      - player_ATK_expected
      - monster_DEF
      - monster_HP
      - N_max
    output_range: [true, false]
    notes: "N_max = 10（固定，安全范围 5–20）。启动时验证，违反则拒绝进入游戏。另含 DEF 独立上限校验 monster_DEF < player_ATK_expected (堵 HP=1 漏洞)。"
    added: "2026-06-23"
    revised: ""

  - name: monster_atk_ceiling
    status: active
    source: design/gdd/entity-database.md
    referenced_by:
      - design/gdd/entity-database.md
    description: "D3 — 怪物 ATK 上限约束（死墙防护）：击杀该怪所受总伤不得超过玩家该楼层预期 HP 的安全比例。逐怪约束,不建模层并发。"
    expression: "max(0, monster_ATK - player_DEF_expected) * ceil(monster_HP / max(1, player_ATK_expected - monster_DEF)) <= HP_BUDGET_RATIO * player_HP_expected"
    variables:
      - monster_ATK
      - player_DEF_expected
      - monster_HP
      - player_ATK_expected
      - monster_DEF
      - HP_BUDGET_RATIO
      - player_HP_expected
    output_range: [true, false]
    notes: "HP_BUDGET_RATIO 默认 0.35。过 D3 ≠ 层安全(不建模多怪累积)。player_*_expected 待 #3 落地后重跑。"
    added: "2026-06-24"
    revised: ""

  - name: gold_drop_guide
    status: active
    source: design/gdd/entity-database.md
    referenced_by:
      - design/gdd/entity-database.md
    description: "D2 — 金币价值参考公式：非强制,仅离线/编辑期调用,供关卡设计师设定 gold_drop 时参考。"
    expression: "gold_drop_suggested = max(1, round(gold_base * ((monster_HP/player_HP_expected) + (monster_ATK/player_ATK_expected) + (monster_DEF/player_ATK_expected))))"
    variables:
      - monster_HP
      - monster_ATK
      - monster_DEF
      - player_HP_expected
      - player_ATK_expected
      - gold_base
    output_range: [1, null]
    notes: "gold_base: 普通怪=10，Boss=25。max(1,...) 必须套在 round() 外层。reward_premium 目标：普通怪 0.5–0.8，Boss 1.3–2.0。"
    added: "2026-06-23"
    revised: ""


