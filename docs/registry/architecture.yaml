    total_frame_budget_ms: 33.3
    platform: All   # 抖音小游戏 / 低端安卓
    adr: docs/architecture/adr-0007-wasm-douyin-export-pipeline.md
    notes: "项目级帧预算（technical-preferences.md）：30fps / <50 draw calls / <256MB"
    added: 2026-06-29

  - system: grid-floor-switch
    status: "proposed_pending: ADR-0009"   # ⚠️ ADR-0009 仍 Proposed
    budget_ms: 2.0
    adr: docs/architecture/adr-0009-grid-floor-rebuild-performance.md
    notes: "#6 楼层切换重建预算 <2ms（vs 原 256 CellNode 重建 2.5–13ms）；网格 draw call <5（单 atlas TileSet 合并）。TileMapLayer 批量 set_cell"
    referenced_by:
      - docs/architecture/adr-0009-grid-floor-rebuild-performance.md
    added: 2026-06-29
