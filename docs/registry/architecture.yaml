# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: untyped_dictionary_public_interface
    status: active
    description: "公共接口（getter 返回值、信号参数、跨模块函数签名）不得使用 untyped Dictionary。必须用 class_name + RefCounted 强类型。"
    why: "Dictionary 键名错误运行时才暴露，违反强类型编码规范，AC 类型断言无法编译期验证，下游无法引用类型。"
    adr: docs/architecture/adr-0001-data-type-implementation.md
    added: 2026-06-25

  - pattern: return_internal_reference_from_readonly_source
    status: active
    description: "只读数据源（EntityDB/FloorDB/TuningConfig）的 getter 不得返回内部原始对象引用，必须返回 duplicate()/duplicate_deep() 副本。"
    why: "返回原始引用使下游写入直接污染权威数据源，破坏只读契约（违反 AC-FL-13/AC-TC-13）。"
    adr: docs/architecture/adr-0001-data-type-implementation.md
    added: 2026-06-25

  - pattern: await_in_foundation_load_validate
    status: active
    description: "Foundation Autoload 的 _load_and_validate() 实现禁止包含任何 await 表达式。_load_and_validate() 必须为纯同步函数。"
    why: "await 在 _ready() 中将后续代码推迟到下一帧，导致 _initialized = true 在当前 _ready() 返回后才执行；下一个 Autoload 的 _ready() 随即开始，其 assert(dep.is_initialized) 守卫在前置依赖尚未完成时触发，整个 Autoload 顺序保证机制失效（ADR-0002 核心机制依赖同步完成保证）。"
    adr: docs/architecture/adr-0002-autoload-startup-order.md
    added: 2026-06-25

  - pattern: scene_node_connect_database_ready_in_ready
    status: active
    description: "场景节点不得在自身的 _ready() 中连接 Foundation Autoload（TuningConfig/EntityDB/FloorDB）的 database_ready 信号后期望收到 emit。"
    why: "所有 Autoload 的 _ready()（含 database_ready.emit()）在任意场景节点 _ready() 之前已全部完成；场景节点通过自身 _ready() 连接后，信号早已 emit，连接后永远不会再触发。应使用 is_initialized 标志直接检查，而非信号监听。"
    adr: docs/architecture/adr-0002-autoload-startup-order.md
    added: 2026-06-25

  - pattern: autoload_script_declares_classname
    status: active
    description: "注册进 project.godot [autoload] 的脚本不得声明与注册名同名的 class_name（应 `extends Node` 无 class_name）。单例按干净全局名访问。"
    why: "Godot 4.5.2 实证：class_name X 脚本注册为同名 autoload X → `Parse Error: Class \"X\" hides an autoload singleton`，脚本无法编译、autoload 创建失败。证伪 ADR-0008 E-1。数据/值类（非 autoload）保留 class_name 不受此限。"
    adr: docs/architecture/adr-0010-autoload-naming-convention.md
    added: 2026-07-01

  - pattern: autoload_holds_scene_node_reference
    status: active
    description: "Autoload 不得在类变量中持有具体 Scene Node 类型的引用（如 `var grid: GridMovement`）。Autoload 通过自身信号与 Scene Node 通信；Scene Node 通过直接方法调用与 Autoload 通信。"
    why: "Scene 重载或场景切换时 Autoload 持有的 Node 引用变为失效悬挂引用，导致空引用崩溃。信号反转依赖：Autoload 发出信号，Node 连接，Autoload 无需持有引用。"
    adr: docs/architecture/adr-0003-system-hosting.md
    added: 2026-06-25

  - pattern: game_logic_in_scene_node
    status: active
    description: "Scene Node（GridMovement/HUD/NumberFeedback）不得拥有有状态的游戏逻辑或持久化游戏状态。Scene Node 负责视觉渲染和输入捕获；将业务逻辑委托给对应的 Autoload 方法调用。"
    why: "游戏逻辑在 Scene Node 中无法跨楼层持久化（Node 随场景重载消亡）；无法在 GDUnit4 headless 模式下测试（需要场景树）；违反 ADR-0003 的宿主分类调节面。"
    adr: docs/architecture/adr-0003-system-hosting.md
    added: 2026-06-25

  - pattern: dir_access_floor_discovery
    status: active
    description: "Foundation Autoload（FloorDB 及任何后续 Autoload）不得使用 DirAccess.get_files_at('res://data/floors/') 或任何 DirAccess 目录枚举来发现数据文件。楼层发现必须通过 manifest.json 清单文件。"
    why: "DirAccess.get_files_at('res://') 在 WASM PCK VFS 中不返回目录条目（VFS 无目录元数据，仅有文件路径），调用结果为空列表，楼层静默丢失不报错。manifest.json 方案在添加楼层时多一步更新清单，成本可接受，换取 WASM 兼容性确定性。"
    adr: docs/architecture/adr-0005-data-file-organization.md
    added: 2026-06-25

  - pattern: rng_in_deterministic_combat
    status: active
    description: "CombatSystem 实现文件（src/combat_system.gd 及其导入文件）不得包含任何随机数调用：禁止 randf()、randi()、randf_range()、randi_range()、RandomNumberGenerator、seed()。RNG 亦不得通过依赖注入注入 CombatSystem（外部传入 RNG 同样违反此约束）。"
    why: "零随机数是 P2「算得清的确定性」的硬约束（combat-system.md C6）：给定相同属性入参，战斗结果必须完全可复算，支柱「算得清的确定性」与「伤害预演」（#10）的核心承诺依赖此保证。引入任何 RNG 调用会破坏确定性，使 AC-SCOPE-NORNG 和 AC-SEQ-CONSISTENCY 全部失效。"
    adr: docs/architecture/adr-0006-deterministic-combat-complete-interface.md
    added: 2026-06-26

  - pattern: forward_plus_renderer_in_wasm_project
    status: active
    description: "本项目 Project Settings 中不得将渲染后端切换至 Forward+ 或 Mobile（即便在本地开发机上）。始终使用 Compatibility 渲染后端，以确保本地与 WASM/Douyin 导出行为一致。"
    why: "Forward+ 和 Mobile 渲染器依赖 Vulkan/D3D12/Metal，WASM/WebGL 2.0 不支持这些图形 API；在 Forward+ 下开发调试会导致本地与 WASM 行为不一致（着色器、CanvasItem material 参数差异），且切换成本在每次导出时都需要人工确认（ADR-0007 决策 1）。"
    adr: docs/architecture/adr-0007-wasm-douyin-export-pipeline.md
    added: 2026-06-26

  - pattern: cell_level_process_in_grid
    status: "proposed_pending: ADR-0009"   # ⚠️ ADR-0009 仍 Proposed
    description: "#6 网格的 cell / per-cell 覆盖节点不得使用 per-frame _process()/_physics_process()。动态效果（CF-7 脉冲高亮、门/楼梯动画）须用 Tween 或 AnimationPlayer 驱动并在结束后归还对象池。"
    why: "避免网格渲染产生大量 per-frame 处理基线开销；TileMapLayer cell 本就无脚本，覆盖节点数量须按需最小化。"
    adr: docs/architecture/adr-0009-grid-floor-rebuild-performance.md
    added: 2026-06-29

  - pattern: repeated_get_floor_in_switch_loop
    status: "proposed_pending: ADR-0009"   # ⚠️ ADR-0009 仍 Proposed
    description: "#6 楼层切换时只调用一次 FloorDB.get_floor(new_floor_id) 取整个 FloorEntry 副本；禁止在 set_cell/_passable 遍历循环内或 per-cell 路径中重复调用 get_floor()。"
    why: "FloorDB.get_floor 每次 duplicate_deep 产出 256 个 CellEntry（ADR-0001）；在 256 格循环内重复调用 → 单次切换 65536 个 CellEntry 待 GC，低端 WASM GC 暂停显著。"
    adr: docs/architecture/adr-0009-grid-floor-rebuild-performance.md
    added: 2026-06-29

