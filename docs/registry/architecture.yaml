# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: cross_module_data_types
    status: active
    api: "class_name + Resource 子类（用 .new()/from_dict 从 JSON 构造，不经 .tres/ResourceLoader）"
    not: "Dictionary；裸 RefCounted（4.6.3 实证：RefCounted 无 duplicate/duplicate_deep，无法承载只读副本契约）"
    adr: docs/architecture/adr-0001-data-type-implementation.md
    reason: "强类型字段、编译期键名校验、跨文件可引用、headless 可测；Resource 提供 duplicate()/duplicate_deep()（只读副本契约所需），RefCounted 无此二方法（2026-06-29 spike 实证 prototypes/wasm-export-spike/verify_dup.gd）；JSON 构造路径不产生 resource_path、不进 ResourceLoader 缓存；**所有数据字段须 @export**（duplicate*/duplicate_deep 只拷贝 @export 属性，plain var 副本为空——verify_dup3 实证）。适用于 MonsterEntry/ItemEntry/KeyEntry/FloorEntry/CellEntry/CombatResult/CombatForecast/RoundEvent"
    referenced_by:
      - docs/architecture/adr-0001-data-type-implementation.md
      - docs/architecture/adr-0005-data-file-organization.md
      - docs/architecture/adr-0009-grid-floor-rebuild-performance.md
    added: 2026-06-25
    revised: "2026-06-29（原 api=class_name + RefCounted 子类；spike 实证 RefCounted 无 duplicate/duplicate_deep，改 Resource）"

  - purpose: readonly_data_source_access
    status: active
    api: "getter 返回 duplicate()（扁平）/ duplicate_deep()（嵌套，4.5+）副本 —— 二者均为 Resource 方法（载体 Resource，见 cross_module_data_types）"
    not: "返回数据库内部原始引用"
    adr: docs/architecture/adr-0001-data-type-implementation.md
    reason: "下游对副本的写入不污染权威数据源（EntityDB/FloorDB/TuningConfig）。FloorEntry 含嵌套 grid 用 duplicate_deep()；扁平结构用 duplicate()。注：duplicate()/duplicate_deep() 是 Resource 方法，RefCounted 无——故载体必须是 Resource"
    referenced_by:
      - docs/architecture/adr-0001-data-type-implementation.md
    added: 2026-06-25
    revised: "2026-06-29（澄清：副本方法为 Resource 方法，载体随 ADR-0001 修订定为 Resource）"

  - purpose: foundation_autoload_startup_order
    status: active
    api: "Project Settings Autoload 列表排序：TuningConfig[1] → EntityDB[2] → FloorDB[3] → GameBootstrap[4]"
    not: "信号异步初始化（await dep.database_ready）或不定顺序的 Autoload 列表"
    adr: docs/architecture/adr-0002-autoload-startup-order.md
    reason: "Godot 4 保证 _ready() 按列表顺序同步调用；同步 JSON 加载无需异步机制；await 在 _ready() 中会破坏顺序保证并在 WASM 中产生未定义行为"
    referenced_by:
      - docs/architecture/adr-0002-autoload-startup-order.md
    added: 2026-06-25
    revised: ""

  - purpose: foundation_autoload_readiness_check
    status: active
    api: "is_initialized: bool（只读 getter，_ready() 末尾成功后设 true）+ assert(dep.is_initialized) 守卫（debug）+ GameBootstrap if 守卫（release）"
    not: "轮询 dep.is_initialized 而不做守卫，或依赖 database_ready 信号进行时序协调；`Dep as Dep` 类型化转型（ADR-0010 订正：autoload 无 class_name，用全局名直接 assert）"
    adr: docs/architecture/adr-0002-autoload-startup-order.md
    reason: "assert 守卫在 debug build 快速失败；GameBootstrap if 守卫在 release build 保留；database_ready 信号在场景节点 _ready() 之前已 emit，不可用于时序协调"
    referenced_by:
      - docs/architecture/adr-0002-autoload-startup-order.md
      - docs/architecture/adr-0010-autoload-naming-convention.md
    added: 2026-06-25
    revised: "2026-07-01（ADR-0010：就绪检查改 `assert(Dep != null and Dep.is_initialized)` 全局名，去掉 `Dep as Dep` 转型——同名 class_name/autoload 在 4.5.2 编译错误）"

  - purpose: autoload_naming_convention
    status: active
    api: "Autoload 节点脚本【不声明 class_name】（extends Node）；单例按 Project Settings 干净注册名全局访问（EntityDB/TuningConfig/…，与 GDD 一致）；就绪检查 assert(Dep != null and Dep.is_initialized) 无 as 转型；测试用 preload(\"res://…\").new() 实例化。数据/值类（非 autoload）保留 class_name 不受影响。"
    not: "autoload 脚本声明与注册名同名的 class_name（→ Parse Error: Class hides an autoload singleton，4.5.2 实证）；`Dep as Dep` 转型"
    adr: docs/architecture/adr-0010-autoload-naming-convention.md
    reason: "Godot 4.5.2 实证：class_name X 与同名 autoload X 冲突（编译错误）。证伪 ADR-0008 E-1「注册名必须==class_name」。方案①（去 class_name + 全局名访问）与 GDD 干净名一致、Godot 惯用；代价=单例访问失去静态类型（通行取舍）。影响全部 11 个计划 autoload。"
    referenced_by:
      - docs/architecture/adr-0010-autoload-naming-convention.md
    added: 2026-07-01
    revised: ""

